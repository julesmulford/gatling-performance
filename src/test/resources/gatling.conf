gatling {
  core {
    encoding = "utf-8"
    directory {
      results = "target/gatling"
    }
  }
  http {
    maxConnectionsPerHost = 6
    connectTimeout = 5000
    readTimeout = 10000
    enableGA = false
  }
  charting {
    indicators {
      lowerBound = 800
      higherBound = 1200
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }
}

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Smoke Simulation
        run: mvn gatling:test -Dgatling.simulationClass=simulations.SmokeSimulation

      - name: Upload Smoke Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gatling-smoke-report
          path: target/gatling/

  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Load Simulation (reduced for CI)
        run: |
          mvn gatling:test \
            -Dgatling.simulationClass=simulations.LoadSimulation \
            -Dload.users=5 \
            -Dload.rampSeconds=10 \
            -Dload.durationSeconds=60

      - name: Upload Load Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gatling-load-report
          path: target/gatling/
